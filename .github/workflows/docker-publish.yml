name: Docker Build and Push

# 自动构建并推送 Docker 镜像到 Docker Hub
# 触发条件：发布 Release 或手动触发

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to Docker Hub'
        required: true
        default: true
        type: boolean
      tag:
        description: 'Image tag (default: latest or release tag)'
        required: false
        type: string

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: l17728/lsm-backend
  FRONTEND_IMAGE: l17728/lsm-frontend

jobs:
  # ============================================
  # 构建并推送 Backend 镜像
  # ============================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "TAG=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: ${{ github.event_name == 'release' || inputs.push_images }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 构建并推送 Frontend 镜像
  # ============================================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "TAG=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi
      
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: ${{ github.event_name == 'release' || inputs.push_images }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          platforms: linux/amd64,linux/arm64
          build-args: |
            VITE_API_BASE_URL=http://localhost:8080/api
            VITE_WS_URL=ws://localhost:8080
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ============================================
  # 创建部署清单
  # ============================================
  create-manifest:
    name: Create Deployment Manifest
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'release'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create deployment info
        run: |
          cat > deployment-info.json << EOF
          {
            "version": "${{ github.event.release.tag_name }}",
            "release_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "backend_image": "${{ env.BACKEND_IMAGE }}:${{ github.event.release.tag_name }}",
            "frontend_image": "${{ env.FRONTEND_IMAGE }}:${{ github.event.release.tag_name }}",
            "docker_compose_url": "https://raw.githubusercontent.com/l17728/lsm/main/docker-compose.prod.yml"
          }
          EOF
          cat deployment-info.json
      
      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info
          path: deployment-info.json

  # ============================================
  # 更新文档
  # ============================================
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: [create-manifest]
    if: github.event_name == 'release'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update INSTALL.md with new version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          # 可以在这里添加自动更新文档的逻辑
          echo "Release $VERSION published"
          echo "Backend: ${{ env.BACKEND_IMAGE }}:$VERSION"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:$VERSION"