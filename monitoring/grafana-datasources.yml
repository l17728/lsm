# Grafana Dashboard Configuration for LSM Project
# Version: 1.0.0
# Date: 2026-03-13

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s

# Dashboard provisioning
providers:
  - name: 'LSM Dashboards'
    orgId: 1
    folder: 'LSM Project'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
