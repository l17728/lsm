# Prometheus Configuration for LSM Project
# Version: 1.0.0
# Date: 2026-03-12

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    monitor: 'lsm-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules
rule_files: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'lsm-server'

  # PostgreSQL Exporter
  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:9187']
        labels:
          instance: 'lsm-database'

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
        labels:
          instance: 'lsm-cache'

  # Backend Application
  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:4000']
        labels:
          instance: 'lsm-backend'

  # Frontend Application
  - job_name: 'frontend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:3000']
        labels:
          instance: 'lsm-frontend'
