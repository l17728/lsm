# Prometheus Alert Rules for LSM Project
# Version: 1.1.0 - Day 7 Enhanced Alerts
# Date: 2026-03-13
# Updates: Added response time, error rate, and resource utilization alerts per Day 7 requirements

groups:
  - name: lsm-alerts
    interval: 30s
    rules:
      # ============================================
      # Day 7 Enhanced Alerts - Business Requirements
      # ============================================
      
      # API Response Time Alert (>200ms) - Day 7 Requirement
      - alert: LSMHighAPIResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="lsm-backend"}[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API response time exceeds 200ms threshold"
          description: "95th percentile API response time is {{ $value | humanizeDuration }} (threshold: 200ms) for the last 5 minutes."

      # API Error Rate Alert (>1%) - Day 7 Requirement
      - alert: LSMHighAPIErrorRate
        expr: (sum(rate(http_requests_total{job="lsm-backend", status=~"5.."}[5m])) / sum(rate(http_requests_total{job="lsm-backend"}[5m]))) * 100 > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API error rate exceeds 1% threshold"
          description: "API error rate is {{ $value | humanizePercentage }} (threshold: 1%) for the last 5 minutes."

      # CPU Usage Alert (>80%) - Day 7 Requirement
      - alert: LSMHighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage exceeds 80% threshold"
          description: "CPU usage is {{ $value }}% (threshold: 80%) on {{ $labels.instance }} for the last 5 minutes."

      # Memory Usage Alert (>80%) - Day 7 Requirement
      - alert: LSMHighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage exceeds 80% threshold"
          description: "Memory usage is {{ $value }}% (threshold: 80%) on {{ $labels.instance }} for the last 5 minutes."

      # Critical CPU Usage (>90%)
      - alert: LSMCriticalCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is {{ $value }}% (critical threshold: 90%) on {{ $labels.instance }} for 2 minutes."

      # Critical Memory Usage (>90%)
      - alert: LSMCriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is {{ $value }}% (critical threshold: 90%) on {{ $labels.instance }} for 2 minutes."

      # ============================================
      # Existing Alerts
      # ============================================
      
      # Backend API Health
      - alert: LSMBackendDown
        expr: up{job="lsm-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LSM Backend API is down"
          description: "LSM Backend API ({{ $labels.instance }}) has been down for more than 1 minute."

      # High API Error Rate
      - alert: LSMHighErrorRate
        expr: rate(http_requests_total{job="lsm-backend", status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate detected"
          description: "Error rate is {{ $value }} errors/sec for the last 5 minutes."

      # High API Latency
      - alert: LSMHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="lsm-backend"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "95th percentile latency is {{ $value }}s for the last 5 minutes."

      # PostgreSQL Down
      - alert: PostgreSQLDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter is down"
          description: "PostgreSQL exporter ({{ $labels.instance }}) has been down for more than 1 minute."

      # PostgreSQL High Connections
      - alert: PostgreSQLHighConnections
        expr: pg_stat_activity_count > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high connection count"
          description: "PostgreSQL has {{ $value }} active connections."

      # Redis Down
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter is down"
          description: "Redis exporter ({{ $labels.instance }}) has been down for more than 1 minute."

      # Redis High Memory Usage
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value | humanizePercentage }}."

      # Node High CPU
      - alert: NodeHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on node"
          description: "CPU usage is above 90% on {{ $labels.instance }} for 10 minutes."

      # Node High Memory
      - alert: NodeHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on node"
          description: "Memory usage is above 90% on {{ $labels.instance }} for 10 minutes."

      # Node Disk Space Low
      - alert: NodeDiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on node"
          description: "Disk usage is above 85% on {{ $labels.instance }} ({{ $labels.mountpoint }})."

      # LSM Cache Hit Rate Low
      - alert: LSMCacheHitRateLow
        expr: lsm_cache_hit_rate_percent < 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LSM cache hit rate below target"
          description: "Cache hit rate is {{ $value }}% (target: 85%) for the last 5 minutes."

      # LSM Health Unhealthy
      - alert: LSMHealthUnhealthy
        expr: lsm_health_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LSM application is unhealthy"
          description: "LSM application health check has failed for more than 1 minute."

      # LSM Database Unhealthy
      - alert: LSMDatabaseUnhealthy
        expr: lsm_health_database == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LSM database connection unhealthy"
          description: "LSM database health check has failed for more than 1 minute."

      # LSM Redis Unhealthy
      - alert: LSMRedisUnhealthy
        expr: lsm_health_redis == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LSM Redis connection unhealthy"
          description: "LSM Redis health check has failed for more than 1 minute."

      # LSM High Failed Tasks
      - alert: LSMHighFailedTasks
        expr: lsm_db_tasks_failed > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of failed tasks"
          description: "There are {{ $value }} failed tasks in the system."

      # LSM Email Queue Backlog
      - alert: LSMEmailQueueBacklog
        expr: lsm_email_queue_pending > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Email queue backlog detected"
          description: "There are {{ $value }} pending emails in the queue."

      # LSM GPU Allocation High
      - alert: LSMGPUAllocationHigh
        expr: (lsm_db_gpus_allocated / lsm_db_gpus_total) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU allocation rate high"
          description: "GPU allocation rate is {{ $value }}% (> 90%)."

  - name: recording-rules
    interval: 30s
    rules:
      # API Request Rate
      - record: job:http_requests:rate5m
        expr: sum(rate(http_requests_total[5m])) by (job)

      # API Error Rate
      - record: job:http_errors:rate5m
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (job)

      # API Latency P95
      - record: job:http_latency:p95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job))
